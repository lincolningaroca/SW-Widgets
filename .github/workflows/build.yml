name: Build SW_Widgets

on:
push:
pull_request:

jobs:

# 🟦 MSVC (Qt oficial)

build-msvc:
runs-on: windows-latest

```
steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Install Qt (MSVC)
  uses: jurplel/install-qt-action@v3
  with:
    version: 6.6.0
    arch: win64_msvc2019_64

- name: Configure
  run: cmake -B build -S . -DSW_BUILD_EXAMPLES=ON

- name: Build
  run: cmake --build build --config Release
```

# 🟩 MinGW (como tu entorno actual)

build-mingw:
runs-on: windows-latest

```
steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Install Qt (MinGW)
  uses: jurplel/install-qt-action@v3
  with:
    version: 6.6.0
    arch: win64_mingw

- name: Install Ninja
  run: choco install ninja -y

- name: Configure
  run: cmake -G "Ninja" -B build -S . -DSW_BUILD_EXAMPLES=ON

- name: Build
  run: cmake --build build
```

# 🟨 Clang (MSYS2)

build-clang:
runs-on: windows-latest

```
steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Setup MSYS2
  uses: msys2/setup-msys2@v2
  with:
    msystem: CLANG64
    update: true
    install: >
      mingw-w64-clang-x86_64-clang
      mingw-w64-clang-x86_64-cmake
      mingw-w64-clang-x86_64-ninja
      mingw-w64-clang-x86_64-qt6-base

- name: Configure (Clang)
  shell: msys2 {0}
  run: cmake -G "Ninja" -B build -S . \
       -DCMAKE_PREFIX_PATH=/clang64/lib/cmake \
       -DSW_BUILD_EXAMPLES=ON

- name: Build (Clang)
  shell: msys2 {0}
  run: cmake --build build
```
